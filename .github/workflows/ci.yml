name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.1"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Check package version
        run: ci-analyzer --version

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy src

      - name: Run tests
        run: python -m pytest

      - name: Validate minimal example
        run: >
          ci-analyzer validate
          --config examples/minimal/experiment.yaml

      - name: Analyze minimal example
        run: >
          ci-analyzer analyze
          --config examples/minimal/experiment.yaml
          --output .tmp/minimal-report

      - name: Verify generated report
        run: test -f .tmp/minimal-report/analysis.json